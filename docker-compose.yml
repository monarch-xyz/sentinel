services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - sentinel_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  main-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sentinel
    command: ["node", "dist/scripts/migrate.js"]
    restart: "no"

  delivery-migrate:
    build:
      context: ./packages/delivery
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sentinel_delivery
    command: ["node", "dist/scripts/migrate.js"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-api
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DELIVERY_BASE_URL: http://delivery:3100
    command: ["node", "dist/api/index.js"]
    depends_on:
      main-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-worker
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379
    command: ["node", "dist/worker/index.js"]
    depends_on:
      main-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  delivery:
    build:
      context: ./packages/delivery
      dockerfile: Dockerfile
    container_name: sentinel-delivery
    env_file:
      - ./packages/delivery/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sentinel_delivery
      HOST: 0.0.0.0
      PORT: 3100
    depends_on:
      delivery-migrate:
        condition: service_completed_successfully
    ports:
      - "3100:3100"
    restart: unless-stopped

volumes:
  sentinel_postgres_data:
